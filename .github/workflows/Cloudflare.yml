name: Update CrowdSec

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Sync IPs to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_LIST_ID: ${{ secrets.CLOUDFLARE_LIST_ID }}
        run: |
          # 1. Fetch IPs and build items
          curl -s https://raw.githubusercontent.com/Y3ll0w/CrowdSec-CAPI-Decisions/refs/heads/main/all.txt | \
          grep -E '^[0-9]' | \
          awk '{print "{\"value\": \"" $1 "\", \"description\": \"crowdsec-sync\"}"}' | \
          paste -sd, - > items_list.txt
          
          # 2. Build full JSON payload
          echo '{"name": "CrowdSec-CAPI-List", "type": "IP", "items": [' > payload.json
          cat items_list.txt >> payload.json
          echo ']}' >> payload.json

          # 3. Update the Gateway List via file
          curl -v -X PUT "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/gateway/lists/$CLOUDFLARE_LIST_ID" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data @payload.json
